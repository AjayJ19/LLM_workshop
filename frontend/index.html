<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAssist AI — Medical Information Assistant</title>
    <meta name="description" content="MedAssist AI is your trusted, multilingual medical information digital assistant. Get simplified, accurate health information powered by AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ── Header ─────────────────────────────────────────── -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L12 22"/>
                            <path d="M2 12L22 12"/>
                            <circle cx="12" cy="12" r="10"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1 id="app-title">MedAssist AI</h1>
                        <p id="app-subtitle">Your Trusted Health Information Guide</p>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="language-selector">
                    <svg class="lang-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <select id="language-select">
                        <option value="en">English</option>
                        <option value="hi">हिन्दी</option>
                        <option value="ta">தமிழ்</option>
                        <option value="te">తెలుగు</option>
                        <option value="kn">ಕನ್ನಡ</option>
                        <option value="ml">മലയാളം</option>
                    </select>
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Online</span>
                </div>
            </div>
        </header>

        <!-- ── Chat Container ─────────────────────────────────── -->
        <main class="chat-container" id="chat-container">
            <div class="chat-messages" id="chat-messages">
                <!-- Welcome message will be inserted by JS -->
            </div>
        </main>

        <!-- ── Suggestion Chips ───────────────────────────────── -->
        <div class="suggestions-container" id="suggestions-container">
            <div class="suggestions-scroll" id="suggestions-scroll">
                <!-- Suggestion chips inserted by JS -->
            </div>
        </div>

        <!-- ── Input Area ─────────────────────────────────────── -->
        <footer class="input-area">
            <div class="input-container">
                <textarea
                    id="message-input"
                    placeholder="Ask a health question..."
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="send-button" class="send-btn" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <p class="disclaimer" id="disclaimer">
                ⚕️ This assistant provides general health information only. It does not diagnose, treat, or prescribe. Always consult a qualified healthcare professional for medical advice.
            </p>
        </footer>
    </div>

    <!-- ── Typing Indicator Template ──────────────────────────── -->
    <template id="typing-template">
        <div class="message ai-message typing-indicator-msg">
            <div class="message-avatar ai-avatar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L12 22"/><path d="M2 12L22 12"/><circle cx="12" cy="12" r="10"/>
                </svg>
            </div>
            <div class="message-content">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </template>

    <script src="/static/script.js"></script>
</body>
</html>
